version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: smart-office-postgres
    environment:
      POSTGRES_DB: smart_office
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: smart-office-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: builder
    container_name: smart-office-backend
    command: npm run start:dev
    environment:
      NODE_ENV: development
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_NAME: smart_office
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: dev-secret-change-in-prod
      JWT_EXPIRES_IN: 7d
      PORT: 3000
      AI_VISION_URL: http://ai-vision:8000
      FRONTEND_URL: http://localhost:3001
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    ports:
      - '3000:3000'
    volumes:
      - ./backend/src:/app/src
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: builder
    container_name: smart-office-frontend
    command: npm run dev -- -p 3001
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3000
      NEXT_PUBLIC_WS_URL: http://localhost:3000
    ports:
      - '3001:3001'
    volumes:
      - ./frontend/src:/app/src
    depends_on:
      - backend

  ai-vision:
    build:
      context: ./ai-vision
      dockerfile: Dockerfile
    container_name: smart-office-ai-vision
    environment:
      DEVICE: ${AI_DEVICE:-cpu}
      MODEL_PATH: models/yolov8n.pt
      BACKEND_URL: http://backend:3000
      CONFIDENCE_THRESHOLD: '0.60'
    ports:
      - '8000:8000'
    volumes:
      - ./ai-vision/models:/app/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  postgres_data:
  redis_data:
