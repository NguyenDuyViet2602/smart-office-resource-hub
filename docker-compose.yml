version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: smart-office-postgres
    environment:
      POSTGRES_DB: smart_office
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: smart-office-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: builder
    container_name: smart-office-backend
    command: npm run start:dev
    environment:
      NODE_ENV: development
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: smart_office
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-prod}
      JWT_EXPIRES_IN: 7d
      PORT: 3000
      AI_VISION_URL: http://ai-vision:8000
      AI_SERVICE_API_KEY: ${AI_SERVICE_API_KEY:-changeme-internal-ai-key}
      FRONTEND_URL: http://localhost:3001
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@smartoffice.local}
    ports:
      - '3000:3000'
    volumes:
      - ./backend/src:/app/src
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3000/ || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: builder
    container_name: smart-office-frontend
    command: npm run dev -- -p 3001
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3000
      NEXT_PUBLIC_WS_URL: http://localhost:3000
    ports:
      - '3001:3001'
    volumes:
      - ./frontend/src:/app/src
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3001/ || exit 1']
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  ai-vision:
    build:
      context: ./ai-vision
      dockerfile: Dockerfile
    container_name: smart-office-ai-vision
    environment:
      DEVICE: ${AI_DEVICE:-cpu}
      MODEL_PATH: models/yolov8n.pt
      BACKEND_URL: http://backend:3000
      AI_SERVICE_API_KEY: ${AI_SERVICE_API_KEY:-changeme-internal-ai-key}
      ALLOWED_ORIGINS: http://localhost:3001
      CONFIDENCE_THRESHOLD: '0.60'
    ports:
      - '8000:8000'
    volumes:
      - ./ai-vision/models:/app/models

volumes:
  postgres_data:
  redis_data:
